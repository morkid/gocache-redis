name: Go

on:
  push:
    branches: [ master ]
    paths:
    - '**/*.go'
    - '**/go.mod'
    - '**/go.sum'
    - 'go.work'
    - '**/*.yml'
    - '**/*.yaml'
    - '.github/**'
  pull_request:
    branches: [ master ]

jobs:

  build:
    # All versions in this repo use miniredis for offline testing, so no
    # Redis service container is required.
    #
    # Legacy versions (v3, v4, v5, v7) skip go mod tidy because Go 1.24+
    # auto-bumps their go directive to the current toolchain version.
    # They are pinned at go 1.16 (matching the parent gocache library)
    # and only need go test to verify correctness.
    name: Build (${{ matrix.dir }} — Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [v3, v4, v5, v7, v8]
        go-version: ['1.21', '1.24']
    steps:

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Check out code
      uses: actions/checkout@v4

    - name: Test (${{ matrix.dir }}, offline via miniredis)
      working-directory: ${{ matrix.dir }}
      run: |
        if [ "${{ matrix.dir }}" = "v3" ] || [ "${{ matrix.dir }}" = "v4" ] || [ "${{ matrix.dir }}" = "v5" ] || [ "${{ matrix.dir }}" = "v7" ]; then
          go test -v ./...
        else
          go mod tidy && go test -v ./...
        fi
